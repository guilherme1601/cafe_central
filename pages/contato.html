<!DOCTYPE html>
<html>
<head>
    <title>Contato</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <!-- Cabeçalho -->
    <header class="topo">
        <div class="logo">
            <a href="../index.html">Café<span>Central</span></a>
        </div>
        <nav class="menu">
            <a href="../index.html">Início</a>
            <a href="../pages/sobre.html">Sobre</a>
            <a href="../pages/cardapio.html">Cardapio</a>
            <a href="../pages/contato.html" class="ativo">Contato</a>
        </nav>
    </header>
    
    <!-- Conteúdo -->
    <section class="contato">
        <h2>Fale conosco</h2>

        <form id="formContato">
            <label for="nome">Digite seu nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required minlength="3">

            <label for="email">Digite seu e-mail:</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>

            <label for="mensagem">Digite sua mensagem:</label>
            <textarea rows="5" id="mensagem" required minlength="10"></textarea>

            <button type="submit">Enviar</button>

            <!-- mensagem de feedback -->
            <p id="msgStatus"></p>
        </form>
    </section>

    <!-- Rodapé -->
    <footer class="rodape">
        <p>® 2026 Café Central. Todos os Direitos Reservados</p>
    </footer>

    <script src="../js/script.js"></script>
</body>
</html>
